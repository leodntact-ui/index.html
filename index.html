  const m24=ch24<=-10?5:ch24<=-5?12:ch24<=-3?22:ch24<=-1.5?32:ch24<=0?44:ch24<=1.5?55:ch24<=3?65:ch24<=5?75:ch24<=10?84:92;

// ══ CRYPTO via CoinGecko ══
async function loadCrypto(){
  const ids=CRYPTOS.map(c=>c.id).join(',');
  const url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h,7d`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('CoinGecko '+r.status);
  const d=await r.json();
  if(!Array.isArray(d))throw new Error('CoinGecko bad response');
  return d.map(c=>{
    const m=CRYPTOS.find(x=>x.id===c.id)||{s:c.symbol.toUpperCase(),n:c.name,note:''};
    const ch24=c.price_change_percentage_24h||0;
    const ch7=c.price_change_percentage_7d_in_currency||0;
    const fromH=c.ath?((c.current_price-c.ath)/c.ath*100):null;
    return{s:m.s,n:m.n,c:'Crypto',flag:'₿',score:calcScore(ch24,ch7,fromH),p:fp(c.current_price),v:r2(ch24),v7:r2(ch7),note:m.note,src:'CoinGecko'};
  });
}

// ══ STOCKS via Twelvedata ══
async function loadStocks(){
  const results=[];
  const batchSize=50;
  const batches=[];
  for(let i=0;i<STOCKS.length;i+=batchSize)batches.push(STOCKS.slice(i,i+batchSize));

  for(let i=0;i<batches.length;i++){
    const batch=batches[i];
    const syms=batch.map(s=>s.s).join(',');
    try{
      const url=`https://api.twelvedata.com/quote?symbol=${encodeURIComponent(syms)}&apikey=${TD_KEY}&dp=2`;
      const r=await fetch(url);
      if(!r.ok)throw new Error('TD '+r.status);
      const d=await r.json();
      const isMulti=batch.length>1;
      batch.forEach(meta=>{
        const q=isMulti?d[meta.s]:d;
        if(!q||q.status==='error'||!q.close)return;
        const price=parseFloat(q.close||0);
        const ch24=parseFloat(q.percent_change||0);
        const high52=parseFloat(q['52_week_high']||0);
        const fromH=high52&&price?((price-high52)/high52*100):null;
        // Devise locale
        const currency=q.currency||'USD';
        const priceStr=currency!=='USD'?(fp(price)+' '+currency):('$'+fp(price));
        results.push({
          s:meta.s.split(':')[0], // Affiche juste le ticker sans la bourse
          n:meta.n,c:meta.c,flag:meta.flag||'🌍',
          score:calcScore(ch24,null,fromH),
          p:priceStr,v:r2(ch24),v7:null,
          note:meta.note,src:'Twelvedata'
        });
      });
    }catch(e){
      console.warn(`Batch ${i+1} failed:`,e.message);
    }
    setPg(40+Math.round((i+1)/batches.length*55),`Actions ${Math.min(STOCKS.length,(i+1)*batchSize)}/${STOCKS.length}...`);
    if(i<batches.length-1)await new Promise(r=>setTimeout(r,300));
  }
  return results;
}

  assets=[];
  document.getElementById('lst').innerHTML=`<div class="load"><div class="spin">⟳</div><p style="font-size:13px;color:#6B7280;margin-bottom:8px">Scan mondial en cours...</p><div class="pgb"><div class="pgf" id="pg" style="width:5%"></div></div><p class="pgtxt" id="pgtxt">Connexion aux APIs...</p></div>`;
  document.getElementById('sub').textContent='Chargement...';
  try{
    setPg(5,'Crypto en cours...');
    const [cr,st]=await Promise.allSettled([loadCrypto(),loadStocks()]);
    const cryptos=cr.status==='fulfilled'?cr.value:[];
    const stocks=st.status==='fulfilled'?st.value:[];
    setPg(100,'Chargé !');
    const seen=new Set();
    assets=[...cryptos,...stocks].filter(a=>{
      if(seen.has(a.s))return false;
      seen.add(a.s);return true;
    }).sort((a,b)=>a.score-b.score);
    document.getElementById('sub').textContent=`${assets.length} actifs mondiaux · ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
    const occ=assets.filter(d=>d.score<=20).slice(0,8);
    document.getElementById('occ').innerHTML=occ.length
      ?occ.map(d=>`<button class="otag" onclick="hl('${d.s}')">${d.flag} ${d.s} <span style="opacity:.7">${d.score}</span></button>`).join('')
      :'<span style="color:#6B7280;font-size:11px">Marché calme — aucune peur extrême</span>';
    render();

    document.getElementById('lst').innerHTML=`<div class="load"><p style="color:#EF4444;font-size:13px;margin-bottom:12px">Erreur: ${e.message}</p><button onclick="init()" style="padding:8px 20px;border-radius:99px;border:none;background:#6366F1;color:#fff;font-weight:700;cursor:pointer">↻ Réessayer</button></div>`;
  }
}

function hl(s){document.getElementById('srch').value=s;sf('all');}

function gauge(sc){
  const z=gz(sc);
  const angle=(sc/100)*180-90;
  const tr=d=>d*Math.PI/180;
  const cx=40,cy=36,r=28;
  const arc=(a1,a2,col,op=1)=>{
    const x1=cx+r*Math.cos(tr(a1)),y1=cy+r*Math.sin(tr(a1));
    const x2=cx+r*Math.cos(tr(a2)),y2=cy+r*Math.sin(tr(a2));
    return`<path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" opacity="${op}"/>`;
  };
  const segs=[[-90,-54,'#EF4444'],[-54,-18,'#F97316'],[-18,18,'#EAB308'],[18,54,'#84CC16'],[54,90,'#22C55E']];
  let p=segs.map(([a1,a2,c])=>arc(a1,a2,c,.2)).join('');
  const sa=-90+(sc/100)*180;
  segs.forEach(([a1,a2,c])=>{if(a1>=sa)return;p+=arc(a1,Math.min(a2,sa),c);});
  const nx=cx+(r-7)*Math.cos(tr(angle)),ny=cy+(r-7)*Math.sin(tr(angle));
  p+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${z.c}" stroke-width="2" stroke-linecap="round"/>`;
  p+=`<circle cx="${cx}" cy="${cy}" r="3" fill="${z.c}"/>`;
  return`<svg viewBox="0 0 80 44" style="width:58px;height:32px;flex-shrink:0">${p}</svg>`;
}

function conseil(sc){
  if(sc<=20)return"🔥 Peur extrême — opportunité rare. Accumule en DCA 3 tranches. Fondamentaux intacts, seul le sentiment panique.";
  if(sc<=35)return"👀 Zone de peur — pression temporaire. Rentre en 2 tranches, garde du cash si ça baisse encore.";
  if(sc<=50)return"⏳ Zone neutre — pas de signal fort. Attends cassure ou repli avant d'agir.";
  if(sc<=65)return"🟡 Légère cupidité — ne chasse pas les prix. Prends profits partiels.";
  if(sc<=80)return"⚠️ Cupidité — réduis progressivement, les autres achètent tu allèges.";
  return"🚨 Cupidité extrême — pire moment pour entrer. Protège tes gains.";
}

            <div class="st"><div class="sl">Score</div><div class="sv2" style="color:${z.c}">${d.score}/100</div></div>
            <div class="st"><div class="sl">24h</div><div class="sv2" style="color:${vc};font-size:12px">${vs}</div></div>
            ${d.v7!=null?`<div class="st"><div class="sl">7j</div><div class="sv2" style="color:${d.v7>=0?'#22C55E':'#EF4444'};font-size:12px">${d.v7>=0?'+':''}${d.v7}%</div></div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
}

function tog(s){expanded=expanded===s?null:s;render();}
init();
setInterval(init,5*60*1000);
</script>
</body>
</html>
