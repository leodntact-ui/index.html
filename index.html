function sc2(ch24,ch7,fromH){
  const m24=ch24<=-10?5:ch24<=-5?12:ch24<=-3?22:ch24<=-1.5?32:ch24<=0?44:ch24<=1.5?55:ch24<=3?65:ch24<=5?75:ch24<=10?84:92;
  const m7=ch7==null?50:ch7<=-25?5:ch7<=-15?14:ch7<=-8?24:ch7<=-3?36:ch7<=0?46:ch7<=3?55:ch7<=8?64:ch7<=15?74:ch7<=25?84:92;
  const mH=fromH==null?50:fromH>=-3?88:fromH>=-10?72:fromH>=-25?52:fromH>=-45?32:fromH>=-65?16:6;
  return Math.max(5,Math.min(95,Math.round(m24*.4+m7*.35+mH*.25)));
}
function fp(p,cur){
  if(!p||isNaN(p))return'—';
  p=Number(p);
  const sym=cur&&cur!=='USD'?(cur+' '):' $';
  if(p>=1000)return(cur&&cur!=='USD'?cur+' ':'')+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(p>=1)return(cur&&cur!=='USD'?cur+' ':'$')+p.toFixed(2);
  if(p>=0.01)return'$'+p.toFixed(4);
  return'$'+p.toFixed(6);
}
const r2=n=>Math.round((n||0)*100)/100;
function setPg(w,t){
  const e=document.getElementById('pg'),tx=document.getElementById('pgtxt');

}

async function loadCrypto(){
  // Charger top 100 par market cap directement — pas besoin de liste fixe
  const url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h,7d`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('CoinGecko '+r.status);
  const d=await r.json();
  if(!Array.isArray(d)||d.length===0)throw new Error('CoinGecko vide');
  return d.map(c=>{
    const meta=CRYPTO_META[c.id]||{n:c.name,note:''};
    const ch24=c.price_change_percentage_24h||0;
    const ch7=c.price_change_percentage_7d_in_currency||0;
    const fromH=c.ath?((c.current_price-c.ath)/c.ath*100):null;
    return{s:c.symbol.toUpperCase(),n:meta.n||c.name,c:'Crypto',flag:'₿',
      score:sc2(ch24,ch7,fromH),p:fp(c.current_price),v:r2(ch24),v7:r2(ch7),
      note:meta.note||'Top 100 CoinGecko',src:'CoinGecko ✓'};
  });
}

let assets=[], filtre='occ', cat='All', expanded=null, errors=[];

function setPg(w,t){
  const e=document.getElementById('pg'),tx=document.getElementById('pgtxt');
  if(e)e.style.width=w+'%';if(tx&&t)tx.textContent=t;
}

async function loadCrypto(){
  const url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h,7d`;
  const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
  if(!r.ok)throw new Error('CoinGecko HTTP '+r.status);
  const d=await r.json();
  if(!Array.isArray(d)||!d.length)throw new Error('CoinGecko: réponse vide');
  return d.map(c=>{
    const meta=CRYPTO_META[c.id]||{n:c.name,note:'Top 100 crypto'};
    const ch24=c.price_change_percentage_24h||0;
    const ch7=c.price_change_percentage_7d_in_currency||0;
    const fromH=c.ath?((c.current_price-c.ath)/c.ath*100):null;
    return{s:c.symbol.toUpperCase(),n:meta.n,c:'Crypto',f:'₿',
      score:sc2(ch24,ch7,fromH),p:fp(c.current_price),v:r2(ch24),v7:r2(ch7),
      note:meta.note,src:'CoinGecko ✓'};
  });
}

async function loadStocksBatch(batch){
  const syms=batch.map(x=>x.s).join(',');
  const url=`https://api.twelvedata.com/quote?symbol=${encodeURIComponent(syms)}&apikey=${TD}&dp=2`;
  const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
  if(!r.ok)throw new Error('TD HTTP '+r.status);
  const d=await r.json();
  const results=[];
  batch.forEach(meta=>{
    const q=batch.length>1?d[meta.s]:d;
    if(!q||q.status==='error'||!q.close)return;
    const price=parseFloat(q.close||0);
    if(!price||price<=0)return;
    const ch24=parseFloat(q.percent_change||0);
    const high52=parseFloat(q['52_week_high']||0);
    const fromH=high52&&price?((price-high52)/high52*100):null;
    const cur=q.currency||'USD';
    const priceStr=cur==='USD'?'$'+fp(price):(fp(price)+' '+cur);
    results.push({s:meta.s,n:meta.n,c:meta.c,f:meta.f||'🌍',
      score:sc2(ch24,null,fromH),p:priceStr,v:r2(ch24),v7:null,
      note:meta.note,src:'Twelvedata ✓'});
  });
  return results;
}

async function loadStocks(){
  const results=[];
  const size=40; // batch de 40 symboles
  const batches=[];
  for(let i=0;i<STOCKS.length;i+=size)batches.push(STOCKS.slice(i,i+size));
  for(let i=0;i<batches.length;i++){
    try{
      const r=await loadStocksBatch(batches[i]);
      results.push(...r);
    }catch(e){errors.push('Batch '+(i+1)+': '+e.message);}
    setPg(40+Math.round((i+1)/batches.length*55),`Actions ${Math.min(STOCKS.length,(i+1)*size)}/${STOCKS.length}...`);
    if(i<batches.length-1)await new Promise(r=>setTimeout(r,350));
  }
  return results;
}

async function init(){
  assets=[];errors=[];
  document.getElementById('lst').innerHTML=`<div class="load"><div class="spin">⟳</div><p style="font-size:13px;color:#6B7280;margin-bottom:8px">Scan mondial en cours...</p><div class="pgb"><div class="pgf" id="pg" style="width:5%"></div></div><p class="pgtxt" id="pgtxt">Connexion...</p></div>`;
  document.getElementById('sub').textContent='Chargement...';
  try{
    setPg(5,'Top 100 crypto...');
    const [cr,st]=await Promise.allSettled([loadCrypto(),loadStocks()]);
    const cryptos=cr.status==='fulfilled'?cr.value:(errors.push('Crypto: '+cr.reason?.message),[]);
    const stocks=st.status==='fulfilled'?st.value:(errors.push('Stocks: '+st.reason?.message),[]);
    setPg(100,'Chargé !');
    const seen=new Set();
    assets=[...cryptos,...stocks].filter(a=>{
      if(seen.has(a.s))return false;seen.add(a.s);return true;
    }).sort((a,b)=>a.score-b.score);
    const total=assets.length;
    document.getElementById('sub').textContent=`${total} actifs · mondial · ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
    const occ=assets.filter(d=>d.score<=20).slice(0,8);
    document.getElementById('occ').innerHTML=occ.length
      ?occ.map(d=>`<button class="otag" onclick="hl('${d.s}')">${d.f} ${d.s} ${d.score}</button>`).join('')
      :'<span style="color:#6B7280;font-size:11px">Marché calme — aucune peur extrême</span>';
    render();
  }catch(e){
    document.getElementById('lst').innerHTML=`<div class="load"><p style="color:#EF4444;font-size:13px;margin-bottom:12px">Erreur: ${e.message}</p><button onclick="init()" style="padding:8px 20px;border-radius:99px;border:none;background:#6366F1;color:#fff;font-weight:700;cursor:pointer">↻ Réessayer</button></div>`;
  }
}

function hl(s){document.getElementById('srch').value=s;sf('all');}

function gauge(sc){
  const z=gz(sc),angle=(sc/100)*180-90,tr=d=>d*Math.PI/180,cx=40,cy=36,r=28;
  const arc=(a1,a2,col,op=1)=>{
    const x1=cx+r*Math.cos(tr(a1)),y1=cy+r*Math.sin(tr(a1)),x2=cx+r*Math.cos(tr(a2)),y2=cy+r*Math.sin(tr(a2));
    return`<path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" opacity="${op}"/>`;
  };
  const segs=[[-90,-54,'#EF4444'],[-54,-18,'#F97316'],[-18,18,'#EAB308'],[18,54,'#84CC16'],[54,90,'#22C55E']];
  let p=segs.map(([a1,a2,c])=>arc(a1,a2,c,.2)).join('');
  const sa=-90+(sc/100)*180;
  segs.forEach(([a1,a2,c])=>{if(a1>=sa)return;p+=arc(a1,Math.min(a2,sa),c);});
  const nx=cx+(r-7)*Math.cos(tr(angle)),ny=cy+(r-7)*Math.sin(tr(angle));
  return`<svg viewBox="0 0 80 44" style="width:58px;height:32px;flex-shrink:0">${p}<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${z.c}" stroke-width="2" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="3" fill="${z.c}"/></svg>`;
}

function cj(sc){
  if(sc<=20)return"🔥 Peur extrême — opportunité rare. Accumule en DCA 3 tranches.";
  if(sc<=35)return"👀 Zone de peur — pression temporaire. Rentre en 2 tranches.";
  if(sc<=50)return"⏳ Zone neutre — attends un signal plus clair avant d'agir.";
  if(sc<=65)return"🟡 Légère cupidité — prends profits partiels sur tes PV.";
  if(sc<=80)return"⚠️ Cupidité — réduis progressivement, les autres achètent.";
  return"🚨 Cupidité extrême — pire moment pour entrer. Protège tes gains.";
}

function sf(f){filtre=f;document.querySelectorAll('.b').forEach(b=>b.classList.remove('on'));document.getElementById('f-'+f).classList.add('on');render();}
function sc(c){cat=c;document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));document.getElementById('c-'+c).classList.add('on');render();}

function render(){
  if(!assets.length)return;
  const q=document.getElementById('srch').value.toUpperCase();
  let list=[...assets];
  if(cat!=='All')list=list.filter(d=>d.c===cat);
  if(q)list=list.filter(d=>d.s.includes(q)||d.n.toUpperCase().includes(q));
  if(filtre==='occ')list=list.filter(d=>d.score<=35);
  if(filtre==='risk')list=list.filter(d=>d.score>=65);
  list.sort((a,b)=>a.score-b.score);
  document.getElementById('cnt').textContent=list.length+' actif'+(list.length>1?'s':'')+' · temps réel';
  document.getElementById('lst').innerHTML=(errors.length?`<div class="errbx">⚠️ ${errors.length} erreur(s): ${errors.slice(0,2).join(' | ')}</div>`:'')
    +(list.length===0?'<div style="text-align:center;padding:40px;color:#374151;font-size:13px">Aucun résultat</div>'
    :list.map(d=>{
      const z=gz(d.score),vc=d.v>=0?'#22C55E':'#EF4444',vs=(d.v>=0?'+':'')+d.v+'%',isO=expanded===d.s;
      return`<div class="card" style="border-color:${isO?z.c+'55':'#1a1a2e'}" onclick="tog('${d.s}')">
        <div class="ct">${gauge(d.score)}
          <div class="inf">
            <div class="nr">
              <div><span style="font-size:12px">${d.f||''}</span> <span class="sym">${d.s}</span><span class="nm">${d.n}</span></div>
              <div class="pb"><div class="px">${d.p}</div><div class="vc" style="color:${vc}">${vs}</div></div>
            </div>
            <div class="br">
              <div class="bb"><div class="bf" style="width:${d.score}%;background:${z.c}"></div></div>
              <span class="sv" style="color:${z.c}">${d.score}</span>
              <span class="bg" style="background:${z.c}18;color:${z.c}">${z.s}</span>
            </div>
            <div class="nt">${d.note} <span style="color:#22C55E;font-size:8px">· ${d.src}</span></div>
          </div>
        </div>
        <div class="dt ${isO?'on':''}">
          <div style="font-size:12px;font-weight:700;color:${z.c};margin-bottom:8px">${z.s} — ${z.l}</div>
          <div class="cj" style="background:${z.c}15;color:${z.c}">${cj(d.score)}</div>
          <div class="sts">
            <div class="st"><div class="sl">Type</div><div class="sv2" style="color:#9CA3AF;font-size:10px">${d.f} ${d.c}</div></div>
            <div class="st"><div class="sl">Score</div><div class="sv2" style="color:${z.c}">${d.score}/100</div></div>
            <div class="st"><div class="sl">24h</div><div class="sv2" style="color:${vc};font-size:12px">${vs}</div></div>
            ${d.v7!=null?`<div class="st"><div class="sl">7j</div><div class="sv2" style="color:${d.v7>=0?'#22C55E':'#EF4444'};font-size:12px">${d.v7>=0?'+':''}${d.v7}%</div></div>`:''}
          </div>
        </div>
      </div>`;
    }).join(''));
}

function tog(s){expanded=expanded===s?null:s;render();}
init();
setInterval(init,5*60*1000);
