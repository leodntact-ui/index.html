function getZone(s) { return ZONES.find(z=>s<=z.max)||ZONES[4]; }

// Calcul du score Fear & Greed basé sur données réelles
function calcScore(changePercent, high52w, low52w, currentPrice, vol24h) {
  // 1. Momentum (variation sur 24h/semaine)
  let momentum = 50;
  if (changePercent <= -10) momentum = 5;
  else if (changePercent <= -5) momentum = 15;
  else if (changePercent <= -3) momentum = 25;
  else if (changePercent <= -1) momentum = 35;
  else if (changePercent <= 0)  momentum = 45;
  else if (changePercent <= 1)  momentum = 55;
  else if (changePercent <= 3)  momentum = 65;
  else if (changePercent <= 5)  momentum = 75;
  else momentum = 88;

  // 2. Position dans le range 52 semaines
  let position52w = 50;
  if (high52w && low52w && currentPrice) {
    const range = high52w - low52w;
    if (range > 0) {
      position52w = Math.round(((currentPrice - low52w) / range) * 100);
      position52w = Math.max(0, Math.min(100, position52w));
    }
  }

  // Score final pondéré
  const score = Math.round(momentum * 0.6 + position52w * 0.4);
  return Math.max(5, Math.min(95, score));
}

function formatPrice(p, sym) {
  if (p >= 1000) return '$' + p.toLocaleString('fr-FR', {maximumFractionDigits:0});
  if (p >= 1) return '$' + p.toFixed(2);
  if (p >= 0.01) return '$' + p.toFixed(4);
  return '$' + p.toFixed(6);
}

async function loadCryptos() {
  try {
    const ids = CRYPTO_IDS.map(c=>c.id).join(',');
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false&price_change_percentage=24h`);
    const data = await res.json();
    
    return data.map(coin => {
      const meta = CRYPTO_IDS.find(c=>c.id===coin.id) || {s:coin.symbol.toUpperCase(), n:coin.name, note:""};
      const change = coin.price_change_percentage_24h || 0;
      const score = calcScore(change, coin.high_24h*1.5, coin.low_24h*0.5, coin.current_price, coin.total_volume);
      return {
        s: meta.s,
        n: meta.n,
        c: "Crypto",
        score,
        p: formatPrice(coin.current_price, meta.s),
        v: Math.round(change * 10) / 10,
        note: meta.note,
        source: "CoinGecko Live"
      };
    });
  } catch(e) {
    console.error('CoinGecko error:', e);
    return [];
  }
}

async function loadStocks() {
  const results = [];
  // Batch par groupes de 5 pour éviter rate limit
  const batches = [];
  for(let i=0; i<STOCK_ASSETS.length; i+=5) batches.push(STOCK_ASSETS.slice(i,i+5));
  
  for(const batch of batches) {
    await Promise.all(batch.map(async asset => {
      try {
        const [quote, profile] = await Promise.all([
          fetch(`https://finnhub.io/api/v1/quote?symbol=${asset.s}&token=${FINNHUB_KEY}`).then(r=>r.json()),
          fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${asset.s}&metric=all&token=${FINNHUB_KEY}`).then(r=>r.json())
        ]);
        
        const change = quote.dp || 0; // % change
        const current = quote.c || 0;
        const high52 = profile.metric?.['52WeekHigh'] || current * 1.3;
        const low52  = profile.metric?.['52WeekLow']  || current * 0.7;
        
        const score = calcScore(change, high52, low52, current, 0);
        
        results.push({
          s: asset.s,
          n: asset.n,
          c: asset.c,
          score,
          p: current > 0 ? formatPrice(current, asset.s) : 'N/A',
          v: Math.round(change * 10) / 10,
          note: asset.note,
          source: "Finnhub Live"
        });
      } catch(e) {
        console.error(`Error ${asset.s}:`, e);
      }
    }));
    await new Promise(r=>setTimeout(r,300)); // petit délai entre batches
  }
  return results;
}

function miniGauge(score) {
  const z = getZone(score);
  const angle = (score/100)*180-90;
  const toRad = d=>d*Math.PI/180;
  const cx=40,cy=36,r=28;
  function arc(a1,a2,col,op=1){
    const x1=cx+r*Math.cos(toRad(a1)),y1=cy+r*Math.sin(toRad(a1));
    const x2=cx+r*Math.cos(toRad(a2)),y2=cy+r*Math.sin(toRad(a2));
    return `<path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" opacity="${op}"/>`;
  }
  const segs=[[-90,-54,"#EF4444"],[-54,-18,"#F97316"],[-18,18,"#EAB308"],[18,54,"#84CC16"],[54,90,"#22C55E"]];
  let p=segs.map(([a1,a2,c])=>arc(a1,a2,c,0.2)).join('');
  const sa=-90+(score/100)*180;
  segs.forEach(([a1,a2,c])=>{if(a1>=sa)return;p+=arc(a1,Math.min(a2,sa),c);});
  const nx=cx+(r-7)*Math.cos(toRad(angle)),ny=cy+(r-7)*Math.sin(toRad(angle));
  p+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${z.color}" stroke-width="2" stroke-linecap="round"/>`;
  p+=`<circle cx="${cx}" cy="${cy}" r="3" fill="${z.color}"/>`;
  return `<svg viewBox="0 0 80 44" style="width:58px;height:32px;flex-shrink:0">${p}</svg>`;
}

      const vs=(d.v>=0?'+':'')+d.v+'%';
      const isOpen=expanded===d.s;
      const srcColor = d.source?.includes('Live') ? '#22C55E' : '#6B7280';
      return `
      <div class="card" style="border-color:${isOpen?z.color+'55':'#1a1a2e'}" onclick="toggle('${d.s}')">
        <div class="card-top">
          ${miniGauge(d.score)}
          <div class="info">
            <div class="name-row">
              <div>
                <span class="sym">${d.s}</span>
                <span class="nom">${d.n}</span>
                <span class="source-badge" style="background:${srcColor}22;color:${srcColor}">●</span>
              </div>
              <div><div class="prix">${d.p}</div><div class="varp" style="color:${vc}">${vs}</div></div>
            </div>
            <div class="bar-row">
              <div class="bar-bg"><div class="bar-fill" style="width:${d.score}%;background:${z.color}"></div></div>
              <span class="score-val" style="color:${z.color}">${d.score}</span>
              <span class="badge" style="background:${z.color}18;color:${z.color}">${z.signal}</span>
            </div>
            <div class="note">${d.note}</div>
          </div>
        </div>
        <div class="detail ${isOpen?'show':''}">
          <div style="font-size:12px;font-weight:700;color:${z.color};margin-bottom:8px">${z.signal} — ${z.label}</div>
          <div class="conseil" style="background:${z.color}15;color:${z.color}">${conseil(d.score)}</div>
          <div class="stats">
            <div class="stat"><div class="stat-l">Catégorie</div><div class="stat-v" style="color:#9CA3AF;font-size:10px">${d.c}</div></div>
            <div class="stat"><div class="stat-l">Score F&G</div><div class="stat-v" style="color:${z.color}">${d.score}/100</div></div>
            <div class="stat"><div class="stat-l">24h</div><div class="stat-v" style="color:${vc};font-size:12px">${vs}</div></div>
          </div>
          <div style="margin-top:8px;font-size:10px;color:#374151;text-align:right">Source: ${d.source||'—'}</div>
        </div>
      </div>`;
    }).join('');
}

function toggle(sym){ expanded=expanded===sym?null:sym; render(); }

// Init
document.getElementById('now').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
loadAll();
// Auto-refresh toutes les 5 minutes
setInterval(loadAll, 5*60*1000);
</script>
</body>
</html>
