function getZone(s) { return ZONES.find(z=>s<=z.max)||ZONES[4]; }

  const z = getZone(score);

  const toRad = d=>d*Math.PI/180;
  const cx=40,cy=36,r=28;
  function arc(a1,a2,col,op=1){
    const x1=cx+r*Math.cos(toRad(a1)),y1=cy+r*Math.sin(toRad(a1));
    const x2=cx+r*Math.cos(toRad(a2)),y2=cy+r*Math.sin(toRad(a2));
    return `<path d="M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" opacity="${op}"/>`;
  }
  const segs=[[-90,-54,"#EF4444"],[-54,-18,"#F97316"],[-18,18,"#EAB308"],[18,54,"#84CC16"],[54,90,"#22C55E"]];
  let p=segs.map(([a1,a2,c])=>arc(a1,a2,c,0.2)).join('');
  const sa=-90+(score/100)*180;
  segs.forEach(([a1,a2,c])=>{if(a1>=sa)return;p+=arc(a1,Math.min(a2,sa),c);});
  const nx=cx+(r-7)*Math.cos(toRad(angle)),ny=cy+(r-7)*Math.sin(toRad(angle));
  p+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${z.color}" stroke-width="2" stroke-linecap="round"/>`;
  p+=`<circle cx="${cx}" cy="${cy}" r="3" fill="${z.color}"/>`;
  return `<svg viewBox="0 0 80 44" style="width:58px;height:32px;flex-shrink:0">${p}</svg>`;
}

function conseil(score) {
  if(score<=20) return "🔥 Peur extrême sur un actif solide — opportunité rare. Commence à accumuler en DCA (3 tranches). Les fondamentaux sont intacts, seul le sentiment panique.";
  if(score<=35) return "👀 Zone de peur — actif solide sous pression temporaire. Prépare tes ordres. Rentre en 2 tranches, garde du cash pour aller plus bas si nécessaire.";
  if(score<=50) return "⏳ Zone neutre — pas de signal d'entrée fort. Tiens tes positions existantes. Attends un repli ou une cassure haussière avant d'ajouter.";
  if(score<=65) return "🟡 Légère cupidité — le marché est optimiste. Ne chasse pas les prix. Tiens tes positions et prends des profits partiels sur tes plus grosses PV.";
  if(score<=80) return "⚠️ Cupidité montante — l'euphorie s'installe. Commence à réduire. Les autres achètent, toi tu allèges progressivement.";
  return "🚨 Cupidité extrême — tout le monde est heureux. Historiquement le pire moment pour entrer. Sors une partie de tes positions, protège tes gains.";
}

let filtre='occasions', cat='Tout', expanded=null;

function setFiltre(f){
  filtre=f;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  render();
}
function setCat(c){
  cat=c;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  document.getElementById('c-'+c).classList.add('active');
  render();
}
function refresh(){
  document.getElementById('now').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  render();
}

function render(){
  const q=document.getElementById('search').value.toUpperCase();
  let list=[...ASSETS];
  if(cat!=='Tout') list=list.filter(d=>d.c===cat);
  if(q) list=list.filter(d=>d.s.includes(q)||d.n.toUpperCase().includes(q));
  if(filtre==='occasions') list=list.filter(d=>d.score<=35);
  if(filtre==='risques') list=list.filter(d=>d.score>=65);
  list.sort((a,b)=>a.score-b.score);

  document.getElementById('count').textContent=list.length+' actif'+(list.length>1?'s':'')+' — actifs solides uniquement';

  document.getElementById('list').innerHTML = list.length===0
    ? '<div style="text-align:center;padding:40px;color:#374151">Aucun résultat</div>'
    : list.map(d=>{
      const z=getZone(d.score);
      const vc=d.v>=0?'#22C55E':'#EF4444';
      const vs=(d.v>=0?'+':'')+d.v+'%';
      const isOpen=expanded===d.s;
      const qColor=d.q==='✅'?'#22C55E':d.q==='⚠️'?'#EAB308':'#EF4444';
      return `
      <div class="card" style="border-color:${isOpen?z.color+'55':'#1a1a2e'}" onclick="toggle('${d.s}')">
        <div class="card-top">
          ${miniGauge(d.score)}
          <div class="info">
            <div class="name-row">
              <div><span class="sym">${d.s}</span><span class="nom">${d.n}</span></div>
              <div><div class="prix">${d.p}</div><div class="varp" style="color:${vc}">${vs}</div></div>
            </div>
            <div class="bar-row">
              <div class="bar-bg"><div class="bar-fill" style="width:${d.score}%;background:${z.color}"></div></div>
              <span class="score-val" style="color:${z.color}">${d.score}</span>
              <span class="badge" style="background:${z.color}18;color:${z.color}">${z.signal}</span>
            </div>
            <div class="quality"><span style="color:${qColor}">${d.q}</span> ${d.note}</div>
          </div>
        </div>
        <div class="detail ${isOpen?'show':''}">
          <div class="detail-title" style="color:${z.color}">${z.signal} — ${z.label}</div>
          <div class="conseil" style="background:${z.color}15;color:${z.color}">${conseil(d.score)}</div>
          <div class="stats">
            <div class="stat"><div class="stat-l">Catégorie</div><div class="stat-v" style="color:#9CA3AF;font-size:10px">${d.c}</div></div>
            <div class="stat"><div class="stat-l">Score F&G</div><div class="stat-v" style="color:${z.color}">${d.score}/100</div></div>
            <div class="stat"><div class="stat-l">Variation</div><div class="stat-v" style="color:${vc};font-size:12px">${vs}</div></div>
          </div>
        </div>
      </div>`;
    }).join('');
}

function toggle(sym){ expanded=expanded===sym?null:sym; render(); }

// Init
document.getElementById('now').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

const occ=ASSETS.filter(d=>d.score<=20&&d.q==='✅').sort((a,b)=>a.score-b.score).slice(0,6);
document.getElementById('occ-tags').innerHTML=occ.length
  ? occ.map(d=>`<button class="occ-tag" onclick="document.getElementById('search').value='${d.s}';setFiltre('all');render()">${d.s} ${d.score}</button>`).join('')
  : '<span style="color:#6B7280;font-size:11px">Aucune occasion extrême en ce moment sur actifs solides</span>';

render();
</script>
